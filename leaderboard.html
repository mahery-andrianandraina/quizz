<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classement — Antigravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:         #ffd700;
      --silver:       #c0c0c0;
      --bronze:       #cd7f32;
      --accent:       #38bdf8;
      --accent-bright:#7dd3fc;
      --accent-dim:   rgba(56,189,248,0.3);
      --surface:      rgba(15,23,42,0.75);
      --border:       rgba(56,189,248,0.2);
      --text:         #f1f5f9;
      --text-dim:     #94a3b8;
      --shadow:       0 25px 60px rgba(0,0,0,0.6);
    }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    /* ── Fond particules ── */
    #bg {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(135deg, rgba(15,23,42,0.6) 0%, rgba(2,6,23,0.85) 100%);
    }
    .particle {
      position: absolute;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.3;
    }

    /* ── Layout principal ── */
    #app {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
    }

    /* ── Header ── */
    .page-header { text-align: center; flex-shrink: 0; }
    .page-tag {
      font-size: 0.6rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.4rem);
      background: linear-gradient(to bottom, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

    /* ── Split ── */
    .split-layout {
      display: flex;
      flex-direction: row;
      gap: 20px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── GAUCHE : classement ── */
    .split-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .lb-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-shrink: 0;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .lb-title {
      font-size: 0.75rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--accent); font-weight: 700;
    }
    .lb-count { font-size: 0.75rem; color: var(--text-dim); }

    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      min-height: 0;
    }
    .scroll-container::-webkit-scrollbar { width: 5px; }
    .scroll-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 4px; }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    .lb-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding-top: 4px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      gap: 14px;
      animation: fadeRow 0.4s ease forwards;
      opacity: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-row:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
    @keyframes fadeRow {
      from { opacity:0; transform:translateX(-10px); }
      to   { opacity:1; transform:translateX(0); }
    }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 8px;
      font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
      background: rgba(0,0,0,0.3); color: var(--text-dim); border: 1px solid var(--border);
    }
    .rank-badge.r1 { background: rgba(255,215,0,0.15);   color: var(--gold);   border-color: var(--gold); }
    .rank-badge.r2 { background: rgba(192,192,192,0.12); color: var(--silver); border-color: var(--silver); }
    .rank-badge.r3 { background: rgba(205,127,50,0.12);  color: var(--bronze); border-color: var(--bronze); }

    .name-cell {
      flex: 1; font-weight: 600; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;
    }
    .score-cell {
      font-family: 'Playfair Display', serif;
      font-weight: 700; color: var(--accent); font-size: 1.1rem; text-align: right;
    }
    .lb-row.current-player {
      background: rgba(56,189,248,0.1);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(56,189,248,0.15);
    }
    .current-badge {
      font-size: 0.55rem; background: var(--accent); color: #000;
      padding: 2px 5px; border-radius: 4px; margin-left: 6px;
      font-weight: 700; vertical-align: middle;
    }

    /* ── États ── */
    #loadingState, #emptyState, #errorState {
      text-align: center; padding: 40px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .state-icon  { font-size: 2.5rem; margin-bottom: 12px; }
    .state-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
    .state-sub   { font-size: 0.82rem; color: var(--text-dim); }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--accent-dim); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DROITE : vidéo pleine hauteur ── */
    .split-right {
      flex: 0 0 42%;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      background: #000;
      min-height: 0;
    }
    #bg-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Actions ── */
    .actions {
      display: flex; gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 26px; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; border: none;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #1e40af 100%);
      color: #fff; box-shadow: 0 4px 15px rgba(56,189,248,0.3);
    }
    .btn-primary:hover { background: var(--accent-bright); color: #000; transform: translateY(-2px); }
    .btn-outline {
      background: transparent; color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: rgba(56,189,248,0.1); border-color: var(--accent); color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      html, body { overflow-y: auto; height: auto; }
      #app { height: auto; }
      .split-layout { flex-direction: column-reverse; overflow: visible; }
      .split-right { flex: 0 0 220px; width: 100%; }
      .scroll-container { overflow-y: visible; max-height: none; }
    }
  </style>
</head>

<body>
  <div id="bg"></div>

  <div id="app">

    <!-- Header -->
    <header class="page-header">
      <p class="page-tag">Antigravity — Saison 2026</p>
      <h1 class="page-title">Classement Général</h1>
      <p class="page-sub">Les meilleurs détectives de la mode</p>
    </header>

    <!-- Split -->
    <div class="split-layout">

      <!-- GAUCHE : classement pleine hauteur -->
      <div class="split-left">
        <div class="lb-header">
          <span class="lb-title">🎯 CLASSEMENT COMPLET</span>
          <span class="lb-count" id="lbCount">—</span>
        </div>
        <div class="scroll-container">
          <div id="loadingState">
            <div class="spinner"></div>
            <div class="state-title">Chargement...</div>
            <p class="state-sub">Connexion à Google Sheets en cours</p>
          </div>
          <div id="emptyState" style="display:none">
            <div class="state-icon">🎮</div>
            <div class="state-title">Aucun score pour l'instant</div>
            <p class="state-sub">Soyez le premier à jouer !</p>
          </div>
          <div id="errorState" style="display:none">
            <div class="state-icon">⚠️</div>
            <div class="state-title">Impossible de charger le classement</div>
            <p class="state-sub" id="errorMsg">Vérifiez votre connexion internet.</p>
          </div>
          <div class="lb-grid" id="lbBody" style="display:none"></div>
        </div>
      </div>

      <!-- DROITE : vidéo pleine hauteur -->
      <div class="split-right">
        <video id="bg-video" autoplay loop muted playsinline></video>
      </div>

    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.href='index.html'">Rejouer</button>
      <button class="btn btn-outline" onclick="loadLeaderboard()">Actualiser</button>
      <button class="btn btn-outline" onclick="window.location.href='reveal.html'">Révélation</button>
    </div>

  </div>

  <script>
    /* ══════════════════════════════════════════════
       ▶ CONFIGURATION — modifiez uniquement ici
    ══════════════════════════════════════════════ */
    const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxF6ApL_FibHPtBB5to4sVYEDSQGcyMj8Gw_ijM9MKizG_0U-by5Cg_OHaYPoryhdN9/exec';
    const VIDEO_URL = "https://res.cloudinary.com/djz4uow1p/video/upload/v1776018615/dior_rihanna_xb5myg.mp4";

    /* ── Particules fond ── */
    (function initBg() {
      const bg = document.getElementById('bg');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1;
        p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;`;
        bg.appendChild(p);
        gsap.to(p, {
          x: (Math.random() - 0.5) * 300,
          y: (Math.random() - 0.5) * 300,
          opacity: Math.random() * 0.4,
          duration: Math.random() * 20 + 10,
          repeat: -1, yoyo: true, ease: "sine.inOut"
        });
      }
    })();

    /* ── Chargement vidéo ── */
    (function initVideo() {
      const video = document.getElementById('bg-video');
      video.style.opacity = '0';
      video.style.transition = 'opacity 1s ease';
      video.src = VIDEO_URL;
      video.load();
      video.oncanplaythrough = () => { video.play(); video.style.opacity = '1'; };
    })();

    /* ── Init ── */
    window.addEventListener('DOMContentLoaded', () => {
      window.currentPlayerName = new URLSearchParams(location.search).get('name') || '';
      loadLeaderboard();
    });

    /* ── Charger le classement ── */
    async function loadLeaderboard() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('errorState').style.display   = 'none';
      document.getElementById('lbBody').style.display       = 'none';

      try {
        const res = await fetch(GAS_URL + '?action=getScores', { mode: 'cors' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('loadingState').style.display = 'none';
        if (!data || data.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }
        renderLeaderboard(data);
      } catch (err) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display   = 'block';
        document.getElementById('errorMsg').textContent =
          location.protocol === 'file:'
            ? '⚠️ Ouvrez via un serveur local, pas en file://'
            : 'Erreur : ' + err.message;
      }
    }

    /* ── Afficher le classement ── */
    function renderLeaderboard(entries) {
      entries.sort((a, b) => {
        if (Number(b.score) !== Number(a.score)) return Number(b.score) - Number(a.score);
        return (Number(a.time) || Infinity) - (Number(b.time) || Infinity);
      });

      const tbody = document.getElementById('lbBody');
      tbody.innerHTML = '';

      document.getElementById('lbCount').textContent =
        entries.length + ' joueur' + (entries.length > 1 ? 's' : '');

      const currentUrlName = new URLSearchParams(window.location.search).get('name');

      entries.forEach((entry, i) => {
        const rank      = i + 1;
        const isCurrent = currentUrlName &&
                          entry.name &&
                          currentUrlName.toLowerCase() === entry.name.toLowerCase();

        const row = document.createElement('div');
        row.className = 'lb-row' + (isCurrent ? ' current-player' : '');
        row.style.animationDelay = (i * 0.05) + 's';

        let badgeContent = rank, badgeClass = '';
        if (rank === 1) { badgeContent = '🥇'; badgeClass = 'r1'; }
        if (rank === 2) { badgeContent = '🥈'; badgeClass = 'r2'; }
        if (rank === 3) { badgeContent = '🥉'; badgeClass = 'r3'; }

        const timeStr = entry.time
          ? ` <span style="font-size:0.75rem;opacity:0.6">(${entry.time}s)</span>`
          : '';

        row.innerHTML = `
          <div class="rank-badge ${badgeClass}">${badgeContent}</div>
          <div class="name-cell">
            ${entry.name || 'Anonyme'}
            ${isCurrent ? '<span class="current-badge">VOUS</span>' : ''}
          </div>
          <div class="score-cell">${entry.score} pts${timeStr}</div>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('lbBody').style.display = 'grid';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';
    }
  </script>
</body>
</html>
