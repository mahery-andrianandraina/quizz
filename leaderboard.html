<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classement — Antigravity</title>
  <meta name="description" content="Classement général du jeu de devinette Antigravity" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
      --accent: #38bdf8;
      --accent-bright: #7dd3fc;
      --accent-dim: rgba(56, 189, 248, 0.3);
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.75);
      --border: rgba(56, 189, 248, 0.2);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --shadow: 0 25px 60px rgba(0,0,0,0.6);
      --grad: linear-gradient(135deg, #0f172a 0%, #020617 100%);
    }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    /* Particles Background */
    #bg {
        position: fixed; inset: 0; z-index: 1;
        background: linear-gradient(135deg, rgba(15,23,42,0.6) 0%, rgba(2,6,23,0.85) 100%);
    }
    .video-frame-sidebar {
      width: 100%;
      max-width: 450px;
      height: 240px;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }
    #bg-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .particle {
        position: absolute;
        background: var(--accent);
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.3;
    }

    #app {
        width: 100%;
        max-width: 1400px;
        padding: 20px;
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .glass-card {
        background: var(--surface);
        backdrop-filter: blur(25px);
        border: 1px solid var(--border);
        border-radius: 32px;
        padding: 30px;
        box-shadow: var(--shadow);
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* ─── Header ─── */
    .page-header { text-align: center; margin-bottom: 12px; flex-shrink: 0; }
    .page-tag {
      font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 4px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: #fff;
      background: linear-gradient(to bottom, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-sub { margin-top: 4px; font-size: 0.8rem; color: var(--text-dim); }

    /* Top 3 List Badges */
    .medal-icon { font-size: 1.2rem; }

    /* ─── Split Layout ─── */
    .split-layout {
      display: flex;
      flex-direction: row;
      gap: 30px;
      width: 100%;
      flex: 1;
      overflow: hidden;
      align-items: stretch;
      margin-top: 10px;
    }
    .split-left {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }
    .split-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.15);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
    }
    /* Custom Scrollbar */
    .scroll-container::-webkit-scrollbar { width: 6px; }
    .scroll-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    /* ─── Grid Leaderboard (in right pane) ─── */
    .lb-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-shrink: 0;
      padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .lb-title { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .lb-count { font-size: 0.75rem; color: var(--text-dim); }

    .lb-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      width: 100%;
      padding-top: 5px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 18px;
      gap: 14px;
      animation: fadeRow 0.4s ease forwards;
      opacity: 0;
    }
    .lb-row:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); transition: all 0.2s; }
    @keyframes fadeRow {
      from { opacity:0; transform:translateX(-10px); }
      to   { opacity:1; transform:translateX(0); }
    }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px; font-weight: 700; font-size: 0.9rem;
      background: rgba(0,0,0,0.3); color: var(--text-dim); border: 1px solid var(--border); flex-shrink: 0;
    }
    .rank-badge.r1 { background: rgba(255,215,0,0.15); color: var(--gold); border-color: var(--gold); }
    .rank-badge.r2 { background: rgba(192,192,192,0.12); color: var(--silver); border-color: var(--silver); }
    .rank-badge.r3 { background: rgba(205,127,50,0.12); color: var(--bronze); border-color: var(--bronze); }

    .name-cell { flex: 1; font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
    .score-cell { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--accent); font-size: 1.1rem; text-align: right; }

    /* ─── States ─── */
    #loadingState, #emptyState, #errorState {
      text-align: center; padding: 40px; margin: auto;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 16px; flex-shrink: 0;
    }
    .state-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
    .state-sub { font-size: 0.85rem; color: var(--text-dim); }

    .spinner {
      width: 44px; height: 44px; border: 3px solid var(--accent-dim); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Buttons ─── */
    .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 24px; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; border: none; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #1e40af 100%); color: #fff; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
    .btn-primary:hover { background: var(--accent-bright); color: #000; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(56, 189, 248, 0.4); }
    .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--border); }
    .btn-outline:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); color: #fff; }

    /* Highlight */
    .lb-row.current-player { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); box-shadow: 0 0 10px rgba(56, 189, 248, 0.1); }
    .current-badge {
      font-size: 0.55rem; background: var(--accent); color: #000; padding: 2px 4px; border-radius: 4px; margin-left: 4px; font-weight: 700; vertical-align: middle;
    }

    @media (max-width: 900px) {
      .split-layout { flex-direction: column; overflow-y: auto; }
      .scroll-container { overflow-y: visible; padding-right: 0; }
      .lb-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .split-left { flex: none; margin-bottom: 20px; }
      .split-right { flex: none; overflow: visible; }
    }
  </style>
</head>

<body>
  <div id="bg"></div>

  <div id="app">
    <div class="glass-card">
        <!-- Header -->
        <header class="page-header">
          <p class="page-tag">Jeu de révelation - Episode 2</p>
          <h1 class="page-title">Classement Général</h1>
          <p class="page-sub">Les meilleurs détectives de la mode</p>
        </header>

        <div class="split-layout">
          <!-- LEFT: Video Pane -->
          <div class="split-left">
            <div class="video-frame-sidebar">
              <video id="bg-video" autoplay loop muted playsinline></video>
            </div>
          </div>

          <!-- RIGHT: Leaderboard -->
          <div class="split-right">
            <div class="lb-header">
              <span class="lb-title">🎯 CLASSEMENT COMPLET</span>
              <span class="lb-count" id="lbCount">—</span>
            </div>

            <div class="scroll-container">
              <div id="loadingState">
                <div class="spinner"></div>
                <div class="state-title">Chargement...</div>
                <p class="state-sub">Connexion à Google Sheets en cours</p>
              </div>
              <div id="emptyState" style="display:none">
                <div class="state-icon">🎮</div>
                <div class="state-title">Aucun score pour l'instant</div>
                <p class="state-sub">Soyez le premier à jouer !</p>
              </div>
              <div id="errorState" style="display:none">
                <div class="state-icon">⚠️</div>
                <div class="state-title">Impossible de charger le classement</div>
                <p class="state-sub" id="errorMsg">Vérifiez votre connexion internet.</p>
              </div>

              <div class="lb-grid" id="lbBody" style="display:none"></div>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="actions">
          <button class="btn btn-primary"  onclick="window.location.href='index.html'">Rejouer</button>
          <button class="btn btn-outline"  onclick="loadLeaderboard()">Actualiser</button>
          <button class="btn btn-outline"  onclick="window.location.href='reveal.html'">Révélation</button>
        </div>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════════
       ▶ CONFIGURATION — modifiez uniquement ici
    ══════════════════════════════════════════════ */
    const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxF6ApL_FibHPtBB5to4sVYEDSQGcyMj8Gw_ijM9MKizG_0U-by5Cg_OHaYPoryhdN9/exec'; 
    const VIDEO_URL = "https://res.cloudinary.com/djz4uow1p/video/upload/v1776018615/dior_rihanna_xb5myg.mp4";

    /* ══════════════════════════════════════════════
       BG PARTICLES & VIDEO
    ══════════════════════════════════════════════ */
    function initBg() {
        const bg = document.getElementById('bg');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 1;
            p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;`;
            bg.appendChild(p);
            gsap.to(p, {
                x: (Math.random() - 0.5) * 300,
                y: (Math.random() - 0.5) * 300,
                opacity: Math.random() * 0.4,
                duration: Math.random() * 20 + 10,
                repeat: -1, yoyo: true, ease: "sine.inOut"
            });
        }

        const video = document.getElementById('bg-video');
        video.style.opacity = '0';
        video.style.transition = 'opacity 1s ease';
        video.src = VIDEO_URL;
        video.load();
        video.oncanplaythrough = () => { video.play(); video.style.opacity = '1'; };
    }
    initBg();

    /* ══════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════ */
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      window.currentPlayerName = params.get('name') || '';
      loadLeaderboard();
    });

    /* ══════════════════════════════════════════════
       LOAD LEADERBOARD
    ══════════════════════════════════════════════ */
    async function loadLeaderboard() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('errorState').style.display   = 'none';
      document.getElementById('lbBody').style.display       = 'none';

      try {
        const res = await fetch(GAS_URL + '?action=getScores', { mode: 'cors' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('loadingState').style.display = 'none';

        if (!data || data.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }

        renderLeaderboard(data);
      } catch (err) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display   = 'block';
        if (location.protocol === 'file:') {
          document.getElementById('errorMsg').textContent =
            '⚠️ Fichier ouvert en local (file://). Utilisez un serveur local ou hébergez la page.';
        } else {
          document.getElementById('errorMsg').textContent = 'Erreur : ' + err.message;
        }
      }
    }

    /* ══════════════════════════════════════════════
       RENDER
    ══════════════════════════════════════════════ */
    function renderLeaderboard(entries) {
      entries.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return (a.time || Infinity) - (b.time || Infinity);
      });

      const tbody = document.getElementById('lbBody');
      tbody.innerHTML = '';

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display   = entries.length === 0 ? 'block' : 'none';
      document.getElementById('errorState').style.display   = 'none';

      if (entries.length === 0) return;

      const currentUrlName = new URLSearchParams(window.location.search).get('name');
      document.getElementById('lbCount').textContent = entries.length + ' joueur' + (entries.length > 1 ? 's' : '');

      entries.forEach((entry, i) => {
        const rank = i + 1;
        const row  = document.createElement('div');
        const isCurrent = currentUrlName && entry.name &&
                          currentUrlName.toLowerCase() === entry.name.toLowerCase();

        row.className = 'lb-row' + (isCurrent ? ' current-player' : '');
        row.style.animationDelay = (i * 0.05) + 's';

        const timeStr = entry.time ? ` <span style="font-size:0.75rem;opacity:0.7">(${entry.time}s)</span>` : '';

        let badgeContent = rank;
        let badgeClass   = '';
        if (rank === 1) { badgeContent = '🥇'; badgeClass = 'r1 medal-icon'; }
        if (rank === 2) { badgeContent = '🥈'; badgeClass = 'r2 medal-icon'; }
        if (rank === 3) { badgeContent = '🥉'; badgeClass = 'r3 medal-icon'; }

        row.innerHTML = `
          <div class="rank-badge ${badgeClass}">${badgeContent}</div>
          <div class="name-cell">
            ${entry.name || 'Anonyme'}
            ${isCurrent ? '<span class="current-badge">VOUS</span>' : ''}
          </div>
          <div class="score-cell">${entry.score} pts${timeStr}</div>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('lbBody').style.display = 'grid';
    }
  </script>
</body>
</html>
