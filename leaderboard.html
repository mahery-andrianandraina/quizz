<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classement — Antigravity</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:         #f5c842;
      --gold-dim:     rgba(245,200,66,0.18);
      --gold-glow:    rgba(245,200,66,0.5);
      --silver:       #c0c0c0;
      --bronze:       #cd7f32;
      --red:          #ff2d55;
      --green:        #00e676;
      --bg:           #06080f;
      --panel:        rgba(8,12,28,0.92);
      --border:       rgba(245,200,66,0.22);
      --border-bright:rgba(245,200,66,0.7);
      --text:         #ffffff;
      --text-dim:     #ffffff;
      --shadow:       0 25px 60px rgba(0,0,0,0.7);
    }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0; z-index: 1; overflow: hidden;
    }
    .bg-radial {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 110%, rgba(245,200,66,0.06) 0%, transparent 65%),
        radial-gradient(ellipse 100% 60% at 50% -5%, rgba(20,30,90,0.7) 0%, transparent 70%),
        #06080f;
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(245,200,66,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,66,0.035) 1px, transparent 1px);
      background-size: 55px 55px;
      animation: gridDrift 22s linear infinite;
    }
    @keyframes gridDrift { from { transform: translate(0,0); } to { transform: translate(55px,55px); } }
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 95% 95% at 50% 50%, transparent 35%, rgba(0,0,0,0.88) 100%);
    }
    .particle {
      position: absolute;
      background: var(--gold);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      pointer-events: none;
      opacity: 0.2;
    }

    /* ── App shell ── */
    #app {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 14px;
    }

    /* ── Header ── */
    .page-header { text-align: center; flex-shrink: 0; }
    .page-tag {
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem; letter-spacing: 0.45em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 4px;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.1em;
      color: #fff;
      text-shadow: 0 0 40px rgba(245,200,66,0.2);
      line-height: 1;
    }
    .page-title span { color: var(--gold); }
    .page-sub {
      font-size: 0.85rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--text-dim); margin-top: 4px;
    }

    /* ── Title rule ── */
    .title-rule {
      display: flex; align-items: center; gap: 12px;
      margin-top: 6px; max-width: 340px; margin-left: auto; margin-right: auto;
    }
    .title-rule::before, .title-rule::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--border-bright), transparent);
    }
    .title-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

    /* ── Split layout ── */
    .split-layout {
      display: flex;
      flex-direction: row;
      gap: 18px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* GAUCHE : classement */
    .split-left {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      padding: 20px;
      overflow: hidden;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(245,200,66,0.08);
      min-height: 0;
      position: relative;
    }
    .split-left::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    /* corner decorators */
    .corner { position: absolute; width: 14px; height: 14px; border-color: var(--gold); border-style: solid; z-index: 2; }
    .corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .lb-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; flex-shrink: 0;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(245,200,66,0.1);
    }
    .lb-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--gold); font-weight: 700;
    }
    .lb-count {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.15em;
    }

    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 6px;
      min-height: 0;
    }
    .scroll-container::-webkit-scrollbar { width: 2px; }
    .scroll-container::-webkit-scrollbar-track { background: rgba(245,200,66,0.03); }
    .scroll-container::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.25); }

    .lb-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      padding-top: 4px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      background: rgba(245,200,66,0.02);
      border: 1px solid rgba(245,200,66,0.09);
      clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
      padding: 10px 14px;
      gap: 12px;
      animation: fadeRow 0.4s ease forwards;
      opacity: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .lb-row:hover { background: rgba(245,200,66,0.05); border-color: var(--border); }
    @keyframes fadeRow {
      from { opacity:0; transform:translateX(-10px); }
      to   { opacity:1; transform:translateX(0); }
    }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      font-family: 'Orbitron', monospace;
      font-weight: 700; font-size: 0.78rem; flex-shrink: 0;
      background: rgba(0,0,0,0.3); color: var(--text-dim);
      border: 1px solid rgba(245,200,66,0.15);
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
    }
    .rank-badge.r1 { background: rgba(245,200,66,0.12); color: var(--gold);   border-color: rgba(245,200,66,0.5); }
    .rank-badge.r2 { background: rgba(192,192,192,0.10); color: var(--silver); border-color: rgba(192,192,192,0.4); }
    .rank-badge.r3 { background: rgba(205,127,50,0.10);  color: var(--bronze); border-color: rgba(205,127,50,0.4); }

    .name-cell {
      flex: 1; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .score-cell {
      font-family: 'Orbitron', monospace;
      font-weight: 700; color: var(--gold); font-size: 0.92rem; text-align: right; flex-shrink: 0;
    }
    .lb-row.current-player {
      background: rgba(245,200,66,0.07);
      border-color: rgba(245,200,66,0.45);
      box-shadow: 0 0 14px rgba(245,200,66,0.1);
    }
    .current-badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.45rem; background: var(--gold); color: #000;
      padding: 2px 5px; margin-left: 6px;
      font-weight: 900; vertical-align: middle;
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
    }

    /* States */
    #loadingState, #emptyState, #errorState {
      text-align: center; padding: 32px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    }
    .state-icon  { font-size: 2rem; margin-bottom: 10px; }
    .state-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.1em;
      margin-bottom: 6px; color: var(--gold);
    }
    .state-sub { font-size: 0.88rem; letter-spacing: 0.1em; color: var(--text-dim); }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(245,200,66,0.15); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DROITE : vidéo */
    .split-right {
      flex: 1;
      overflow: hidden;
      border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      box-shadow: var(--shadow);
      background: #000;
      min-height: 0;
      position: relative;
    }
    .split-right::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
      z-index: 2;
    }
    #bg-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Actions ── */
    .actions {
      display: flex; gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 28px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.15em;
      cursor: pointer; transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      border: none; text-transform: uppercase;
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-100%); transition: transform 0.5s ease;
    }
    .btn:hover::before { transform: translateX(100%); }

    .btn-primary {
      background: var(--gold); color: #000;
      clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
      box-shadow: 0 6px 24px rgba(245,200,66,0.35);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(245,200,66,0.5); }

    .btn-outline {
      background: transparent; color: var(--gold);
      border: 1px solid var(--border);
      clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
    }
    .btn-outline:hover { background: rgba(245,200,66,0.06); border-color: rgba(245,200,66,0.6); color: #fff; transform: translateY(-2px); }

    @media (max-width: 768px) {
      html, body { overflow-y: auto; height: auto; }
      #app { height: auto; }
      .split-layout { flex-direction: column-reverse; overflow: visible; }
      .split-right { flex: 0 0 220px; width: 100%; clip-path: none; border-radius: 0; }
      .split-left { clip-path: none; }
      .scroll-container { overflow-y: visible; max-height: none; }
    }
  </style>
</head>

<body>
  <div id="bg">
    <div class="bg-radial"></div>
    <div class="bg-grid"></div>
    <div class="vignette"></div>
  </div>

  <div id="app">

    <header class="page-header">
      <p class="page-tag">Antigravity — Saison 2026</p>
      <h1 class="page-title">Classement <span>Général</span></h1>
      <div class="title-rule"><div class="title-diamond"></div></div>
      <p class="page-sub">Les meilleurs détectives de la mode</p>
    </header>

    <div class="split-layout">

      <!-- GAUCHE : classement 40% -->
      <div class="split-left">
        <div class="corner tl"></div>
        <div class="corner br"></div>
        <div class="lb-header">
          <span class="lb-title">🎯 CLASSEMENT COMPLET</span>
          <span class="lb-count" id="lbCount">—</span>
        </div>
        <div class="scroll-container">
          <div id="loadingState">
            <div class="spinner"></div>
            <div class="state-title">Chargement...</div>
            <p class="state-sub">Connexion à Google Sheets en cours</p>
          </div>
          <div id="emptyState" style="display:none">
            <div class="state-icon">🎮</div>
            <div class="state-title">Aucun score pour l'instant</div>
            <p class="state-sub">Soyez le premier à jouer !</p>
          </div>
          <div id="errorState" style="display:none">
            <div class="state-icon">⚠️</div>
            <div class="state-title">Impossible de charger</div>
            <p class="state-sub" id="errorMsg">Vérifiez votre connexion.</p>
          </div>
          <div class="lb-grid" id="lbBody" style="display:none"></div>
        </div>
      </div>

      <!-- DROITE : vidéo 60% -->
      <div class="split-right">
        <video id="bg-video" autoplay loop muted playsinline></video>
      </div>

    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.href='index.html'">Rejouer</button>
      <button class="btn btn-outline" onclick="loadLeaderboard()">Actualiser</button>
      <button class="btn btn-outline" onclick="window.location.href='reveal.html'">Révélation</button>
    </div>

  </div>

  <script>
    /* ══════════════════════════════════════════════
       ▶ CONFIGURATION — modifiez uniquement ici
    ══════════════════════════════════════════════ */
    const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxF6ApL_FibHPtBB5to4sVYEDSQGcyMj8Gw_ijM9MKizG_0U-by5Cg_OHaYPoryhdN9/exec';
    const VIDEO_URL = "https://res.cloudinary.com/djz4uow1p/video/upload/v1776018615/dior_rihanna_xb5myg.mp4";

    /* ── Particules dorées ── */
    (function initBg() {
      const bg = document.getElementById('bg');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 5 + 2;
        p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;`;
        bg.appendChild(p);
        gsap.to(p, {
          x: (Math.random() - 0.5) * 200,
          y: (Math.random() - 0.5) * 200,
          opacity: Math.random() * 0.3 + 0.05,
          duration: Math.random() * 18 + 10,
          repeat: -1, yoyo: true, ease: "sine.inOut"
        });
      }
    })();

    /* ── Vidéo ── */
    (function initVideo() {
      const video = document.getElementById('bg-video');
      video.style.opacity = '0';
      video.style.transition = 'opacity 1s ease';
      video.src = VIDEO_URL;
      video.load();
      video.oncanplaythrough = () => { video.play(); video.style.opacity = '1'; };
    })();

    /* ── Init ── */
    window.addEventListener('DOMContentLoaded', () => {
      window.currentPlayerName = new URLSearchParams(location.search).get('name') || '';
      loadLeaderboard();
    });

    /* ── Charger les scores ── */
    async function loadLeaderboard() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('errorState').style.display   = 'none';
      document.getElementById('lbBody').style.display       = 'none';

      try {
        const res = await fetch(GAS_URL + '?action=getScores', { mode: 'cors' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('loadingState').style.display = 'none';
        if (!data || data.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }
        renderLeaderboard(data);
      } catch (err) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display   = 'block';
        document.getElementById('errorMsg').textContent =
          location.protocol === 'file:'
            ? '⚠️ Ouvrez via un serveur local, pas en file://'
            : 'Erreur : ' + err.message;
      }
    }

    /* ── Afficher ── */
    function renderLeaderboard(entries) {
      entries.sort((a, b) => {
        if (Number(b.score) !== Number(a.score)) return Number(b.score) - Number(a.score);
        return (Number(a.time) || Infinity) - (Number(b.time) || Infinity);
      });

      const tbody = document.getElementById('lbBody');
      tbody.innerHTML = '';
      document.getElementById('lbCount').textContent =
        entries.length + ' joueur' + (entries.length > 1 ? 's' : '');

      const currentUrlName = new URLSearchParams(window.location.search).get('name');

      entries.forEach((entry, i) => {
        const rank      = i + 1;
        const isCurrent = currentUrlName && entry.name &&
                          currentUrlName.toLowerCase() === entry.name.toLowerCase();

        const row = document.createElement('div');
        row.className = 'lb-row' + (isCurrent ? ' current-player' : '');
        row.style.animationDelay = (i * 0.05) + 's';

        let badgeContent = rank, badgeClass = '';
        if (rank === 1) { badgeContent = '🥇'; badgeClass = 'r1'; }
        if (rank === 2) { badgeContent = '🥈'; badgeClass = 'r2'; }
        if (rank === 3) { badgeContent = '🥉'; badgeClass = 'r3'; }

        const timeStr = entry.time
          ? ` <span style="font-size:0.72rem;opacity:0.6">(${entry.time}s)</span>`
          : '';

        row.innerHTML = `
          <div class="rank-badge ${badgeClass}">${badgeContent}</div>
          <div class="name-cell">
            ${entry.name || 'Anonyme'}
            ${isCurrent ? '<span class="current-badge">VOUS</span>' : ''}
          </div>
          <div class="score-cell">${entry.score} pts${timeStr}</div>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('lbBody').style.display = 'grid';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';
    }
  </script>
</body>
</html>
