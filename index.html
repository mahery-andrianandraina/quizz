<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity — Défi Thématique</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #38bdf8;
            --accent-bright: #7dd3fc;
            --accent-dim: rgba(56, 189, 248, 0.3);
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.75);
            --border: rgba(56, 189, 248, 0.2);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --shadow: 0 25px 60px rgba(0,0,0,0.6);
            --grad: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        /* Particles Background */
        #bg {
            position: fixed; inset: 0; z-index: -1;
            background: var(--grad);
        }
        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
        }

        /* App Container */
        #app {
            width: 100%;
            max-width: 1400px;
            padding: 0;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Glass Card */
        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 0;
            box-shadow: var(--shadow);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
        }
        /* Welcome card keeps rounded style */
        #screen-welcome .glass-card {
            border-radius: 32px;
            padding: 40px;
            height: auto;
            gap: 30px;
        }

        /* Screens */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(30px);
            width: 100%;
        }
        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Typography */
        h1 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.1;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            display: block;
        }

        /* Welcome Screen Specifics */
        #screen-welcome {
            max-width: 600px;
            text-align: center;
        }
        .input-group {
            margin-top: 40px;
            width: 100%;
        }
        input[type="text"] {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 20px 24px;
            border-radius: 16px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #1e40af 100%);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.4);
            background: var(--accent-bright);
            color: #000;
        }
        .btn:active { transform: translateY(-1px); }

        /* Game Screen Layout */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            align-items: stretch;
            width: 100%;
            flex: 1;
            overflow: hidden;
        }
        @media (max-width: 900px) {
            .game-layout { grid-template-columns: 1fr; }
        }

        /* Image Display Stage */
        .image-stage {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-stage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: opacity 0.5s;
            display: block;
        }
        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 70%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .ui-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 30px 40px;
            justify-content: center;
            overflow-y: auto;
        }

        /* Team Selection Grid */
        .teams-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
        }
        .team-btn {
            background: rgba(30, 64, 175, 0.2);
            border: 1px solid var(--border);
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .team-btn:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .team-btn.correct {
            background: rgba(74, 222, 128, 0.3) !important;
            border-color: #4ade80 !important;
            color: #fff !important;
        }
        .team-btn.wrong {
            background: rgba(248, 113, 113, 0.3) !important;
            border-color: #f87171 !important;
            color: #fff !important;
        }
        .team-btn i {
            width: 36px; height: 36px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-style: normal;
            border: 1px solid var(--border);
            color: var(--accent);
        }

        /* HUD — fixed top bar inside glass-card */
        .hud {
            display: flex; justify-content: space-between;
            align-items: center;
            padding: 12px 40px;
            background: rgba(2,6,23,0.6);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .hud-group { text-align: left; }
        .hud-label {
            display: block; font-size: 0.6rem; letter-spacing: 0.3em;
            text-transform: uppercase; color: var(--accent); margin-bottom: 2px;
        }
        .hud-value {
            font-family: 'Playfair Display', serif; font-size: 1.3rem;
            color: #fff;
        }

        .progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.05);
            position: relative; flex-shrink: 0;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #1e40af, var(--accent)); width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 15px var(--accent-dim);
        }

        /* Success/Flash */
        .feedback-overlay {
            position: fixed; inset: 0; z-index: 1000;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
            opacity: 0;
        }
        .feedback-text {
            font-family: 'Playfair Display', serif;
            font-size: 5rem; color: #fff;
            text-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #outfit-desc {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            font-family: 'Playfair Display', serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: left;
            margin-bottom: 5px;
        }

        #timer-container {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            border: 1px solid var(--accent-dim);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            font-size: 0.65rem;
            font-weight: 700;
            z-index: 10;
        }
        #timer-val {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }
        /* Spinning clock icon */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #timer-icon {
            animation: spin 2s linear infinite;
            display: flex;
        }

        #proposer-info {
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            width: 100%;
        }
        #proposer-info strong { color: var(--accent); }

        @keyframes imageIn {
            from { opacity: 0; transform: scale(1.1); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="feedback-overlay" id="feedback">
        <span class="feedback-text" id="feedback-txt"></span>
    </div>

    <div id="app">
        
        <!-- BIENVENUE -->
        <div class="screen active" id="screen-welcome">
            <div class="glass-card">
                <span class="tagline">Édition Spéciale</span>
                <h1 style="font-size: clamp(2rem, 4vw, 3rem); line-height: 1.2; margin-bottom: 12px;">Nouveau Jeu :<br>Révélation du Thème</h1>
                <p style="color: var(--text-dim); line-height: 1.6; max-width: 500px; margin: 0 auto 20px;">Prêts pour un nouveau défi ? Nous allons vous présenter un thème précis : <strong>trouvez le plus rapidement possible</strong> quelle équipe l'a proposé parmi les choix !</p>
                
                <div class="input-group">
                    <input type="text" id="player-name" placeholder="Nom de votre équipe..." maxlength="25">
                    <button class="btn" id="btn-start">Rejoindre la Compétition</button>
                </div>
            </div>
        </div>

        <!-- JEU -->
        <div class="screen" id="screen-game">
            <div class="glass-card">
                <!-- HUD top bar -->
                <div class="hud">
                    <div class="hud-group">
                        <span class="hud-label">Score</span>
                        <span class="hud-value" id="val-score">0000</span>
                    </div>
                    <div class="hud-group" style="text-align: center;">
                        <span class="hud-label">Séquence</span>
                        <span class="hud-value" id="val-stage">1 / 8</span>
                    </div>
                    <div class="hud-group" style="text-align: right;">
                        <span class="hud-label">Joueur</span>
                        <span class="hud-value" id="val-player" style="font-size:1rem;">—</span>
                    </div>
                </div>

                <!-- Progress bar -->
                <div class="progress-bar"><div class="progress-fill" id="val-progress"></div></div>

                <!-- Main game content -->
                <div class="game-layout">
                    <div class="image-stage">
                        <div id="timer-container">
                            <span id="timer-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                                </svg>
                            </span>
                            <div id="timer-val">20.0</div>
                        </div>
                        <img src="" id="game-img" alt="Theme image">
                        <div class="image-overlay"></div>
                    </div>

                    <div class="ui-panel">
                        <div id="outfit-desc"></div>
                        <span class="tagline" style="margin-bottom: 4px; font-size: 0.65rem;">Identification du Thème</span>
                        <div class="teams-grid" id="teams-container">
                            <!-- Team buttons generated here -->
                        </div>
                        <div id="proposer-info">Thème proposé par <strong>---</strong></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const TEAMS = [
            "TEAM AKO", "TEAM ERIKA", "TEAM FANIRY", "TEAM JOHANA", 
            "TEAM NANTE", "TEAM LOVA", "HAPPY NEW YEAR"
        ];

        const STAGES = [
            { img: "pictures/image1.jpeg", correct: "TEAM AKO", desc: "Élégance Romantique : Célébration de la Saint-Valentin" },
            { img: "pictures/image 2.jpg", correct: "TEAM FANIRY", desc: "Patrimoine Culturel : Tenue Traditionnelle Malgache Moderne" },
            { img: "pictures/image 3.jpg", correct: "TEAM ERIKA", desc: "Symphonie Aquatique : Déclinaison de Bleus Océaniques" },
            { img: "pictures/image 4.jpg", correct: "TEAM JOHANA", desc: "Harmonie Formelle : Tuniques Longues Masculines et Robes de Gala Féminines" },
            { img: "pictures/image 5.png", correct: "HAPPY NEW YEAR", desc: "Look Monochrome : L'Art du Total Look Sophistiqué" },
            { img: "pictures/image 6.png", correct: "TEAM JOHANA", desc: "Classicisme Intemporel : Duo Chemise Blanche et Cravate Noire" },
            { img: "pictures/image 7.jpg", correct: "TEAM LOVA", desc: "Géométrie Linéaire : L'Élégance des Rayures Verticales" },
            { img: "pictures/image 8.webp", correct: "TEAM NANTE", desc: "Structure Tailleur : Ensembles avec Vestes Coordonnées" }
        ];

        let gameState = {
            playerName: "",
            score: 0,
            currentStage: 0,
            canClick: true,
            startTime: 0,
            totalTime: 0,
            timerInterval: null,
            lastFakes: []
        };

        /* --- Background --- */
        function initBg() {
            const bg = document.getElementById('bg');
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 1;
                p.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
                `;
                bg.appendChild(p);
                gsap.to(p, {
                    x: (Math.random() - 0.5) * 300,
                    y: (Math.random() - 0.5) * 300,
                    opacity: Math.random() * 0.4,
                    duration: Math.random() * 20 + 10,
                    repeat: -1, yoyo: true, ease: "sine.inOut"
                });
            }
        }

        /* --- UI Logic --- */
        function switchScreen(toId) {
            const current = document.querySelector('.screen.active');
            const next = document.getElementById(toId);
            
            gsap.to(current, { opacity: 0, y: -20, duration: 0.4, onComplete: () => {
                current.classList.remove('active');
                next.classList.add('active');
                gsap.fromTo(next, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" });
            }});
        }

        function startChallenge() {
            const input = document.getElementById('player-name');
            if(!input.value.trim()) {
                gsap.to(input, { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
                return;
            }
            gameState.playerName = input.value.trim();
            switchScreen('screen-game');
            setTimeout(loadNextStage, 600);
        }

        function loadNextStage() {
            if(gameState.currentStage >= STAGES.length) {
                finishGame();
                return;
            }

            const stage = STAGES[gameState.currentStage];
            const imgEl = document.getElementById('game-img');
            const descEl = document.getElementById('outfit-desc');
            const grid = document.getElementById('teams-container');
            const stageLabel = document.getElementById('val-stage');
            const progress = document.getElementById('val-progress');
            const proposerInfo = document.getElementById('proposer-info');

            // Reset UI
            gameState.canClick = false;
            stageLabel.textContent = `${gameState.currentStage + 1} / ${STAGES.length}`;
            progress.style.width = `${(gameState.currentStage / STAGES.length) * 100}%`;
            
            proposerInfo.style.opacity = "0";
            proposerInfo.style.transform = "translateY(10px)";

            // Load Image & Desc
            imgEl.style.opacity = 0;
            descEl.style.opacity = 0;
            descEl.textContent = stage.desc;
            imgEl.src = stage.img;
            
            if(gameState.timerInterval) clearInterval(gameState.timerInterval);
            document.getElementById('timer-val').textContent = "20.0";
            
            imgEl.onload = () => {
                gsap.to(imgEl, { opacity: 1, duration: 0.6 });
                gsap.to(descEl, { opacity: 1, y: 0, delay: 0.3, duration: 0.5 });
                gameState.startTime = Date.now();
                gameState.canClick = true;
                startTimer();
            };

            // Generate Grid — 4 choices only (1 correct + 3 mostly fresh wrong)
            grid.innerHTML = '';
            
            let validFakes = TEAMS.filter(t => t !== stage.correct);
            
            // Prioritize teams that were NOT used as fake options in the previous stage
            let freshFakes = validFakes.filter(t => !gameState.lastFakes.includes(t));
            let usedFakes  = validFakes.filter(t => gameState.lastFakes.includes(t));

            // Small shuffle helper
            const shuffleArr = (arr) => {
                for(let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            freshFakes = shuffleArr(freshFakes);
            usedFakes = shuffleArr(usedFakes);

            let chosenFakes = [];
            while(chosenFakes.length < 3) {
                if(freshFakes.length > 0) chosenFakes.push(freshFakes.pop());
                else if(usedFakes.length > 0) chosenFakes.push(usedFakes.pop());
                else break;
            }

            gameState.lastFakes = [...chosenFakes];
            
            const choices = shuffleArr([stage.correct, ...chosenFakes]);

            choices.forEach((team, idx) => {
                const btn = document.createElement('button');
                btn.className = 'team-btn';
                btn.innerHTML = `<i>${idx + 1}</i> <span>${team}</span>`;
                btn.onclick = () => handleSelection(team, btn);
                grid.appendChild(btn);
                gsap.fromTo(btn, 
                    { opacity: 0, y: 15 }, 
                    { opacity: 1, y: 0, delay: 0.1 + (idx * 0.06), duration: 0.4, ease: "back.out(1.5)" }
                );
            });
        }

        function handleSelection(selectedTeam, btn) {
            if(!gameState.canClick) return;
            gameState.canClick = false;

            const stage = STAGES[gameState.currentStage];
            const correct = stage.correct;
            const buttons = document.querySelectorAll('.team-btn');

            if(selectedTeam === correct) {
                // SUCCESS
                btn.classList.add('correct');
                const timeTaken = (Date.now() - gameState.startTime) / 1000;
                gameState.totalTime += timeTaken;
                const bonus = Math.max(0, Math.floor((20 - timeTaken) * 50));
                const points = 1000 + bonus;
                
                triggerFeedback("EXCELLENT", "#4ade80");
                animateScore(gameState.score, gameState.score + points);
                gameState.score += points;
            } else {
                // FAIL
                const timeTaken = (Date.now() - gameState.startTime) / 1000;
                gameState.totalTime += timeTaken;
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if(b.querySelector('span').textContent === correct) b.classList.add('correct');
                });
                triggerFeedback("DOMMAGE", "#f87171");
            }

            // Show proposer info
            const proposerInfo = document.getElementById('proposer-info');
            proposerInfo.querySelector('strong').textContent = correct;
            proposerInfo.style.opacity = "1";
            proposerInfo.style.transform = "translateY(0)";

            setTimeout(() => {
                gameState.currentStage++;
                gsap.to('.game-layout', { opacity: 0, x: -50, duration: 0.4, onComplete: () => {
                    loadNextStage();
                    gsap.fromTo('.game-layout', { opacity: 0, x: 50 }, { opacity: 1, x: 0, duration: 0.4 });
                }});
            }, 1800);
        }

        function triggerFeedback(text, color) {
            const fb = document.getElementById('feedback');
            const txt = document.getElementById('feedback-txt');
            txt.textContent = text;
            txt.style.color = color;
            
            gsap.fromTo(fb, { opacity: 0, scale: 0.5 }, { 
                opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)",
                onComplete: () => {
                    gsap.to(fb, { opacity: 0, scale: 1.5, delay: 0.8, duration: 0.4 });
                }
            });
        }

        function animateScore(start, end) {
            const obj = { val: start };
            gsap.to(obj, {
                val: end, duration: 1,
                onUpdate: () => {
                    document.getElementById('val-score').textContent = Math.round(obj.val).toString().padStart(4, '0');
                }
            });
        }

        function finishGame() {
            gsap.to('#app', { opacity: 0, scale: 1.1, duration: 1.2, ease: "power4.in", onComplete: () => {
                const params = new URLSearchParams({
                    name: gameState.playerName,
                    score: gameState.score,
                    time: Math.round(gameState.totalTime),
                    hint: 0
                });
                window.location.href = 'reveal.html?' + params.toString();
            }});
        }

        /* --- Timer --- */
        function startTimer() {
            let remaining = 20.0;
            document.getElementById('timer-val').textContent = remaining.toFixed(1);

            if(gameState.timerInterval) clearInterval(gameState.timerInterval);

            gameState.timerInterval = setInterval(() => {
                remaining -= 0.1;
                if(remaining < 0) remaining = 0;
                document.getElementById('timer-val').textContent = remaining.toFixed(1);

                // Color warning when low
                const timerVal = document.getElementById('timer-val');
                if(remaining <= 5) {
                    timerVal.style.color = '#f87171';
                } else if(remaining <= 8) {
                    timerVal.style.color = '#fbbf24';
                } else {
                    timerVal.style.color = '#fff';
                }

                if(remaining <= 0) {
                    clearInterval(gameState.timerInterval);
                    if(gameState.canClick) {
                        // Time's up — auto-fail
                        gameState.canClick = false;
                        gameState.totalTime += 20; // max timer duration
                        triggerFeedback("TEMPS !", "#f87171");
                        const buttons = document.querySelectorAll('.team-btn');
                        const correct = STAGES[gameState.currentStage].correct;
                        buttons.forEach(b => {
                            if(b.querySelector('span').textContent === correct) b.classList.add('correct');
                        });
                        const proposerInfo = document.getElementById('proposer-info');
                        proposerInfo.querySelector('strong').textContent = correct;
                        proposerInfo.style.opacity = "1";
                        proposerInfo.style.transform = "translateY(0)";
                        setTimeout(() => {
                            gameState.currentStage++;
                            gsap.to('.game-layout', { opacity: 0, x: -50, duration: 0.4, onComplete: () => {
                                loadNextStage();
                                gsap.fromTo('.game-layout', { opacity: 0, x: 50 }, { opacity: 1, x: 0, duration: 0.4 });
                            }});
                        }, 1800);
                    }
                }
            }, 100);
        }

        /* --- Init --- */
        initBg();
        document.getElementById('btn-start').onclick = startChallenge;
        document.getElementById('player-name').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') startChallenge();
        });

        // Show player name in HUD when game starts
        const _origStart = startChallenge;
        document.getElementById('btn-start').onclick = () => {
            const input = document.getElementById('player-name');
            if(!input.value.trim()) {
                gsap.to(input, { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
                return;
            }
            gameState.playerName = input.value.trim();
            document.getElementById('val-player').textContent = gameState.playerName;
            switchScreen('screen-game');
            setTimeout(loadNextStage, 600);
        };

    </script>
</body>
</html>
